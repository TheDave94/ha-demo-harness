name: build-publish

# Publishes the populated demo HA as a versioned PUBLIC GHCR image on a vX.Y.Z tag
# push (or manual dispatch with a tag). Consumers pin a version (DESIGN §7);
# :latest is intentionally NOT the pin (latest=false below).
#
# GITHUB_TOKEN with packages:write is sufficient to publish to THIS repo's own
# GHCR namespace — no PAT needed. The org.opencontainers.image.source label links
# the image to the repo (Packages-tab visibility + collaborator pull access).

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build + publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On tag push this is the tag ref; on manual dispatch, the input tag.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR requires a lowercase path. github.com/TheDave94 -> thedave94.
          images: ghcr.io/thedave94/ha-demo-harness
          flavor: latest=false
          # vX.Y.Z + X.Y.Z + sha-<short>. `value` overrides the source ref on
          # manual dispatch; empty on tag push (falls back to the git ref).
          tags: |
            type=semver,pattern=v{{version}},value=${{ github.event.inputs.tag }}
            type=semver,pattern={{version}},value=${{ github.event.inputs.tag }}
            type=sha
          labels: |
            org.opencontainers.image.source=https://github.com/TheDave94/ha-demo-harness
            org.opencontainers.image.description=Populated demo Home Assistant for e2e testing (ha-demo-harness)
            org.opencontainers.image.licenses=MIT

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
